{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoWatt - Connexion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --eco-green: #003366;
            --eco-dark: #f8f9fa;
        }
        body {
            background: linear-gradient(135deg, #003366 0%, #001a33 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }
        .login-logo {
            width: 80px;
            height: 80px;
            margin-bottom: 1.5rem;
            border-radius: 15px;
        }
        .btn-login {
            background: var(--eco-green);
            color: white;
            border-radius: 10px;
            padding: 0.75rem;
            font-weight: 600;
            width: 100%;
            border: none;
            transition: all 0.3s;
        }
        .btn-login:hover {
            background: #002244;
            transform: translateY(-2px);
        }
        .form-control {
            border-radius: 10px;
            padding: 0.75rem 1rem;
            border: 1px solid #dee2e6;
        }
        .form-control:focus {
            box-shadow: 0 0 0 3px rgba(0, 51, 102, 0.2);
            border-color: var(--eco-green);
        }
        .brand-text {
            color: var(--eco-green);
            font-weight: 800;
            font-size: 1.8rem;
            letter-spacing: -1px;
        }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <img src="{% static 'images/logo.png' %}" alt="EcoWatt" class="login-logo">
        <h1 class="brand-text mb-4">EcoWatt</h1>
        <p class="text-muted mb-4">Connectez-vous pour accéder au tableau de bord</p>
        
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} small py-2">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-3 text-start">
                <label class="form-label small fw-bold">Nom d'utilisateur</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-person"></i></span>
                    <input type="text" name="username" class="form-control border-start-0" placeholder="admin ou consultant" required>
                </div>
            </div>
            <div class="mb-4 text-start">
                <label class="form-label small fw-bold">Mot de passe</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" class="form-control border-start-0" placeholder="••••••••" required>
                </div>
            </div>
            <button type="submit" class="btn btn-login">Se connecter</button>
        </form>
    </div>
</body>
</html>
